type: object
required:
  - subject
  - from
  - to
  - reply_to
  - body
properties:
  message_id:
    type: string
  correlation_id:
    type: string
  parent_message_id:
    type:
      - string
      - "null"
  status:
    type: string
    enum:
      - queued
      - delivered
      - failed
      - acknowledged
  subject:
    type: string
  from:
    type: string
  to:
    type: string
  reply_to:
    type: string
  body:
    type: string
  created_at:
    type: string
  delivered_at:
    type:
      - string
      - "null"
