name: gardener_agent
role: Validates presence, renderability, and semantic alignment of section payloads in the manuscript.

tasks:
  - confirm_tex_exists
  - check_individual_render
  - notify_section_agent_on_failure
  - forward_visual_to_design_agent
  - detect_agent_timeout_or_stuck
  - verify_content_alignment_with_outline

permissions:
  - read_all_agent_state
  - read_all_message_logs
  - write_messages_to_all
  - introspect_self
  - log_activity
  
inputs:
  - outline.yaml
  - tex/section_payloads/*.tex
outputs:
  - renders/*.png
  - logs/gardener_report_*.log
  - messages to document_design_agent and section agents

dependencies:
  - pdflatex
  - convert (ImageMagick)
  - outline_agent (for summary/intent matching)