  summary: 'This book introduces Codynamic Theory: a framework for understanding learning,
    structure, and computation through recursive, context-aware evolution. Rooted
    in category theory and informed by embodied cognition, it presents a system of
    tools and structures for expressing, simulating, and iterating on reality-aligned
    systems.

    '
