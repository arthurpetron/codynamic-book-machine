      |

      | ----- | ----- | ----- | ----- |

      | 40 Hz | Tau pathology ↓, motor function ↑ | Neural gamma entrainment, proteostasis
      | Iaccarino et al., 2016; Martorell et al., 2019 |

      | 0.8 Hz | Sleep memory ↑ | Cortical slow oscillation | Ngo et al., 2013 |

      | 30–50 Hz | Vagus stimulation, inflammation ↓ | Afferent vagal tone modulation
      | Bonaz et al., 2016 |

      | 62–125 Hz | Mitochondrial ROS / number modulation | Cellular EM field resonance
      | Krajnak et al., 2020 |

      | 100 Hz | Neurite growth ↑ | Cytoskeletal reorganization | Mo et al., 2022
