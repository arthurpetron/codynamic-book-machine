- book_id: codynamic_book_machine_working_paper
  title: How the Codynamic Book Machine Works
  root: /Users/darthur/Dore Dropbox/Arthur Petron/codex/codynamic-book-machine/data/book_data/codynamic_book_machine_working_paper
  outline_path: outline/codynamic_book_machine_working_paper.yaml
  status: active
  last_opened: '2026-06-13T23:48:21.981152'
  tags: []
  metadata:
    summary: This paper explains the Codynamic Book Machine as both a writing tool
      and a working example of codynamic architecture. It describes how a book begins
      as intent and outline data, becomes a canonical work object, is decomposed into
      section-level work, coordinated through agents and messages, revised through
      proposals and verification, and finally compiled into publication artifacts.
    type: paper
    updated: '2026-06-13'
