- book_id: resonant_bioharmonic_medicine
  title: 'Resonant Bioharmonic Medicine: Using Targeted Frequencies to Modulate Cellular
    Metabolism and Neural State'
  root: /Users/darthur/Dore Dropbox/Arthur Petron/codex/codynamic-book-machine/data/book_data/resonant_bioharmonic_medicine
  outline_path: outline/resonant_bioharmonic_medicine.yaml
  status: active
  last_opened: '2026-06-12T22:27:27.512793'
  tags: []
  metadata:
    summary: This paper proposes Resonant Bioharmonic Medicine (RBM), a mechanistically
      grounded framework for using acoustic and vibrotactile stimuli to modulate human
      physiology. It surveys published frequency-effect pairs, describes resonance
      pathways across biological scales, and outlines prototype devices and an experimental
      roadmap for frequency-based interventions.
    type: paper
    updated: '2026-06-12'
