  metadata:
    summary: This paper proposes Resonant Bioharmonic Medicine (RBM), a mechanistically
      grounded framework for using acoustic and vibrotactile stimuli to modulate human
      physiology. It surveys published frequency-effect pairs, describes resonance
      pathways across biological scales, and outlines prototype devices and an experimental
      roadmap for frequency-based interventions.
