- book_id: codynamic_book_machine_working_paper
  title: How the Codynamic Book Machine Works
  root: /Users/darthur/Dore Dropbox/Arthur Petron/codex/codynamic-book-machine/data/book_data/codynamic_book_machine_working_paper
  outline_path: outline/codynamic_book_machine_working_paper.yaml
  status: active
  last_opened: '2026-06-14T23:31:35.065449'
  tags: []
  metadata:
    summary: This paper explains the Codynamic Book Machine as both a writing tool
      and a working example of codynamic architecture. It describes how authorial
      intent becomes a canonical work object, how that object is decomposed into section-level
      responsibilities, how agents coordinate through task queues and append-only
      messages, how editorial gardening keeps the manuscript coherent, how references
      and diagrams are routed through specialist agents, and how durable artifacts
      become a compiled paper.
    type: paper
    version: 0.2.0
    version_family_id: null
    updated: '2026-06-14'
