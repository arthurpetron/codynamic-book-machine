work:
  id: codynamic_book_machine_working_paper
  type: paper
  title: How the Codynamic Book Machine Works
  subtitle: A Structured Authoring System for Agent-Coordinated Books
  summary: This paper explains the Codynamic Book Machine as both a writing tool and
    a working example of codynamic architecture. It describes how authorial intent
    becomes a canonical work object, how that object is decomposed into section-level
    responsibilities, how agents coordinate through task queues and append-only messages,
    how editorial gardening keeps the manuscript coherent, how references and diagrams
    are routed through specialist agents, and how durable artifacts become a compiled
    paper.
  intent:
    audience: Researchers, tool builders, authors, and software engineers interested
      in agentic authoring systems.
    writing_style: Clear technical exposition with architectural explanation, concrete
      workflow examples, and implementation-level specificity.
    author_persona: System designer explaining the machine from the inside.
    reader_takeaway: Readers should understand the canonical data model, the task/message
      runtime, agent responsibilities, editorial maintenance cycle, reference and
      diagram handoffs, artifact lifecycle, and the design philosophy of the Codynamic
      Book Machine.
    genre: nonfiction
  authors:
  - name: Arthur Petron
    role: author
  metadata:
    version: 0.2.0
    created: '2026-06-13'
    updated: '2026-06-14'
    maintained_by: author
    language: en
    license: CC-BY-4.0
    status: draft
  front_matter:
    title_page:
      enabled: true
    table_of_contents:
      enabled: false
      depth: 3
  structure:
  - type: chapter
    id: abstract
    number: 0
    title: Abstract
    goal: State the paper's claim, scope, and contribution in one page or less.
    summary: Approx. 0.5 pages. Present the Codynamic Book Machine as a schema-backed,
      message-coordinated, multi-agent authoring system that treats books as living
      technical objects.
    prerequisites: []
    dependencies:
      structural: []
      narrative: ''
    key_concepts: []
    citations: []
    content_file: content/sections/abstract.md
  - type: chapter
    id: ch01_introduction
    number: 1
    title: Introduction
    goal: Explain why a book machine is needed and what makes this one codynamic.
    summary: Approx. 2 pages. Frame long-form writing as a coordination problem among
      intent, outline, section drafts, citations, diagrams, reviews, task queues,
      runtime memory, and compiled artifacts.
    prerequisites: []
    dependencies:
      structural: []
      narrative: ''
    key_concepts:
    - id: coordination_problem
      term: Coordination Problem
      definition: The tendency for outlines, prose, citations, diagrams, reviews,
        and builds to drift when they are managed as separate artifacts.
    - id: codynamic_system
      term: Codynamic System
      definition: A system in which code, content, agents, logs, and artifacts evolve
        together through explicit feedback loops.
    citations: []
    content_file: content/sections/ch01_introduction.md
    content:
    - type: section
